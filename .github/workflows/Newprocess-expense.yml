name: Process Expense PDF

on:
  push:
    paths:
       - 'Users/*/uploads/*.pdf'
    branches:
      - main

permissions:
  contents: write

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Get uploaded PDF filename
      id: pdf
      run: |
        PDF_FILE=$(ls -t Users/*/uploads/*.pdf 2>/dev/null | head -1)
        if [ -z "$PDF_FILE" ]; then
          echo "No PDF found"
          exit 1
        fi
        echo "pdf_file=$PDF_FILE" >> $GITHUB_OUTPUT
        echo "pdf_name=$(basename $PDF_FILE)" >> $GITHUB_OUTPUT

    - name: Process PDF
      run: |
        python scripts/process_pdf.py --folder "." "${{ steps.pdf.outputs.pdf_file }}"

    - name: Commit results and archive PDF
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        mkdir -p "${{ steps.pdf.outputs.folder }}/processed"
        mv "${{ steps.pdf.outputs.pdf_file }}" "${{ steps.pdf.outputs.folder }}/processed/"
        git add "${{ steps.pdf.outputs.folder }}/"
        git commit -m "✨ Processed: ${{ steps.pdf.outputs.pdf_name }}" || echo "No changes to commit"
        git push origin main || echo "Nothing to push"