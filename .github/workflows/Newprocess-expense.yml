name: Process Expense PDF

on:
  push:
    paths:
      - 'Users/*/uploads/*.pdf'
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: process-expense-${{ github.ref }}
  cancel-in-progress: false

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Get uploaded PDF filename
      id: pdf
      run: |
        # Get the file changed in this specific push, not just the newest on disk
        PDF_FILE=$(git diff --name-only HEAD~1 HEAD -- 'Users/*/uploads/*.pdf' | head -1)

        # Fallback for the very first commit (no parent)
        if [ -z "$PDF_FILE" ]; then
          PDF_FILE=$(git show --name-only --pretty=format: HEAD -- 'Users/*/uploads/*.pdf' | head -1)
        fi

        if [ -z "$PDF_FILE" ]; then
          echo "No PDF found in this commit"
          exit 1
        fi

        PDF_NAME=$(basename "$PDF_FILE")
        BASE_FOLDER=$(dirname "$(dirname "$PDF_FILE")")

        echo "pdf_file=$PDF_FILE"  >> $GITHUB_OUTPUT
        echo "pdf_name=$PDF_NAME"  >> $GITHUB_OUTPUT
        echo "folder=$BASE_FOLDER" >> $GITHUB_OUTPUT

    - name: Process PDF
      run: |
        python scripts/process_pdf.py --folder "${{ steps.pdf.outputs.folder }}" "${{ steps.pdf.outputs.pdf_file }}"

    - name: Commit results and archive PDF
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        mkdir -p "${{ steps.pdf.outputs.folder }}/processed"
        mv "${{ steps.pdf.outputs.pdf_file }}" "${{ steps.pdf.outputs.folder }}/processed/"
        git add "${{ steps.pdf.outputs.folder }}/"
        git commit -m "✨ Processed: ${{ steps.pdf.outputs.pdf_name }}" || echo "No changes to commit"
        git push origin main || echo "Nothing to push"
