name: Process Expense PDF

on:
  push:
    paths:
      - 'Users/*/uploads/*.pdf'
    branches:
      - main

permissions:
  contents: write

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 2   # IMPORTANT for git diff

    - name: Get uploaded PDF (ONLY changed file)
      id: pdf
      run: |
        FILE=$(git diff --name-only HEAD~1 HEAD | grep 'Users/.*/uploads/.*\.pdf' | head -1)

        if [ -z "$FILE" ]; then
          echo "No PDF found"
          exit 1
        fi

        PDF_NAME=$(basename "$FILE")
        USER_FOLDER=$(echo "$FILE" | cut -d'/' -f2)
        BASE_FOLDER="Users/$USER_FOLDER"

        echo "pdf_file=$FILE" >> $GITHUB_OUTPUT
        echo "pdf_name=$PDF_NAME" >> $GITHUB_OUTPUT
        echo "folder=$BASE_FOLDER" >> $GITHUB_OUTPUT

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install deps
      run: |
        pip install -r requirements.txt

    - name: Process PDF
      run: |
        python scripts/process_pdf.py \
          --input "${{ steps.pdf.outputs.pdf_file }}" \
          --output "${{ steps.pdf.outputs.folder }}/output.json"

    - name: Archive + Commit
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        mkdir -p "${{ steps.pdf.outputs.folder }}/processed"

        mv "${{ steps.pdf.outputs.pdf_file }}" \
           "${{ steps.pdf.outputs.folder }}/processed/"

        git add "${{ steps.pdf.outputs.folder }}/"
        git commit -m "Processed ${{ steps.pdf.outputs.pdf_name }}" || echo "No changes"
        git push
