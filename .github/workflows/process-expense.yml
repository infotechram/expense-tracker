name: Process Expense PDF with AI

on:
  push:
    paths:
      - 'uploads/*.pdf'
    branches:
      - main

permissions:
  contents: write

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Get uploaded PDF filename
      id: pdf
      run: |
        PDF_FILE=$(ls -t uploads/*.pdf 2>/dev/null | head -1)
        if [ -z "$PDF_FILE" ]; then
          echo "No PDF found"
          exit 1
        fi
        echo "pdf_file=$PDF_FILE" >> $GITHUB_OUTPUT
        echo "pdf_name=$(basename $PDF_FILE)" >> $GITHUB_OUTPUT

    - name: Process PDF with Hugging Face
      id: process
      run: |
        python scripts/process_pdf.py "${{ steps.pdf.outputs.pdf_file }}"

    - name: Upload results artifact
      uses: actions/upload-artifact@v4
      with:
        name: expense-results
        path: results/expenses.json

    - name: Commit results
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add results/expenses.json
        git commit -m "✨ Processed: ${{ steps.pdf.outputs.pdf_name }}" || echo "No changes to commit"
        git push origin main || echo "Nothing to push"

    - name: Archive PDF
      run: |
        mkdir -p processed/
        mv uploads/*.pdf processed/ 2>/dev/null || true
        git add processed/ -A
        git commit -m "📦 Archived: ${{ steps.pdf.outputs.pdf_name }}" || echo "No changes"
        git push origin main || echo "Nothing to push"