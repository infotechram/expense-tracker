name: Train Expense Model

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Folder containing training.csv"
        required: true
        
permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install scikit-learn pandas joblib

      - name: Run train_model.py
        run: python train_model.py --folder ${{ github.event.inputs.folder }}

      - name: Commit new model to GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.folder }}/ExpenseModel/expense_model.pkl
          git add ${{ github.event.inputs.folder }}/ExpenseModel/label_map.json
          git commit -m "🤖 Retrained model — $(date '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}