<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Expense Categorizer</h1>
        
        <div id="uploadSection">
            <input type="file" id="fileInput" accept=".pdf" />
            <input type="password" id="tokenInput" placeholder="GitHub Token" />
            <button onclick="upload()">Upload PDF</button>
        </div>

        <div id="processingSection" style="display:none;">
            <p>⏳ Processing...</p>
            <div class="progress"></div>
        </div>

        <div id="resultsSection" style="display:none;">
            <h2>Results</h2>
            
            <div class="stats">
                <div>Total: ₹<span id="totalSpent">0</span></div>
                <div>Transactions: <span id="totalTrans">0</span></div>
                <div>Categories: <span id="totalCats">0</span></div>
            </div>
            <div>
                <label for="groupBy">View by</label>
                <select id="groupBy" onchange="refreshChart()">
                    <option value="category">Category</option>
                    <option value="day_of_week">Day of Week</option>
                </select>
            </div>
            <canvas id="chart"></canvas>

            <table id="table" border="1">
                <tr>
                    <th>#</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                </tr>
            </table>

            <button onclick="save()">Save Changes</button>
            <button onclick="download()">Download JSON</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
