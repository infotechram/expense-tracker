<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>&#128176; Expense Categorizer</h1>

        <div id="uploadSection">
            <input type="file" id="fileInput" accept=".pdf" />
            <input type="password" id="tokenInput" placeholder="GitHub Token" />
            <button onclick="upload()">Upload PDF</button>
        </div>

        <div id="processingSection" style="display:none;">
            <p>⏳ Processing...</p>
            <div class="progress"></div>
        </div>

        <div id="resultsSection" style="display:none;">
            <h2>Results</h2>

            <div class="stats">
                <div>Total: &#8377;<span id="totalSpent">0</span></div>
                <div>Transactions: <span id="totalTrans">0</span></div>
                <div>Categories: <span id="totalCats">0</span></div>
            </div>

            <div style="margin: 12px 0;">
                <label for="groupBy">View by</label>
                <select id="groupBy" onchange="refreshChart()">
                    <option value="category">Category</option>
                    <option value="day_of_week">Day of Week</option>
                </select>
            </div>

            <canvas id="chart"></canvas>

            <div style="display:flex; align-items:center; gap:12px; margin-top:12px;">
                <span id="dayBreakdown" style="display:none; font-size:14px; color:gray;"></span>
                <button id="viewAllBtn" onclick="viewAll()" style="display:none;">View All</button>
            </div>

            <table id="table" border="1" style="width:100%; margin-top:12px;">
                <tr>
                    <th>#</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Day</th>
                </tr>
            </table>

            <div style="margin-top:12px;">
                <button onclick="save()">Save Changes</button>
                <button onclick="download()">Download JSON</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
