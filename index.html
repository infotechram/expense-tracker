<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --text: #e8eaf6;
      --muted: #7b7f99;
      --border: #2e3250;
      --success: #4ade80;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ─── Header ─── */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .header-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .header h1 { font-size: clamp(1.2rem, 5vw, 1.55rem); font-weight: 700; letter-spacing: -0.02em; }
    .header h1 span { color: var(--accent); }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin-bottom: 14px;
    }

    /* ─── Upload ─── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 14px;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: rgba(124,106,247,.06); }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 34px; margin-bottom: 8px; }
    .upload-area strong { display: block; font-size: .95rem; margin-bottom: 4px; }
    .upload-area p { color: var(--muted); font-size: .85rem; }
    .file-chosen { font-size: .8rem; color: var(--success); margin-top: 6px; font-family: 'DM Mono', monospace; }
    .hidden { display: none !important; }

    /* ─── Form controls ─── */
    input[type="password"], input[type="text"], select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: .95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input[type="password"]:focus, input[type="text"]:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    /* Category edit inputs inside table / cards */
    .cat-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: .8rem;
      padding: 4px 8px;
      width: 100%;
      min-width: 100px;
      outline: none;
      -webkit-appearance: none;
    }
    .cat-input:focus { border-color: var(--accent); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Sora', sans-serif; font-size: .9rem; font-weight: 600;
      padding: 12px 20px; cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b8cff);
      color: #fff; width: 100%; margin-top: 14px;
      font-size: 1rem; padding: 14px;
    }
    .btn-sm {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: .82rem; padding: 8px 14px;
    }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: .82rem; padding: 8px 14px;
    }

    /* ─── Processing ─── */
    #processingSection { text-align: center; padding: 24px 0; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .proc-label { color: var(--muted); font-size: .9rem; }

    /* ─── Stats ─── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 14px 10px; text-align: center;
    }
    .stat-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .stat-value { font-size: 1.15rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .stat-value.rupee::before { content: '₹'; font-size: .85rem; color: var(--accent); margin-right: 1px; }

    /* ─── Chart ─── */
    .view-control { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .view-control label { font-size: .85rem; color: var(--muted); flex-shrink: 0; }
    .view-control select { flex: 1; min-width: 140px; }
    .chart-container { position: relative; width: 100%; height: clamp(200px, 55vw, 300px); }

    .day-info {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .day-label { font-size: .82rem; color: var(--muted); }

    /* ─── Transactions — Desktop table ─── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tx-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    .tx-table th {
      background: var(--surface2); color: var(--muted);
      font-size: .68rem; text-transform: uppercase; letter-spacing: .08em;
      padding: 10px 10px; text-align: left; white-space: nowrap;
    }
    .tx-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tx-table tr:last-child td { border-bottom: none; }
    .amount-col { font-family: 'DM Mono', monospace; color: var(--accent2); white-space: nowrap; }

    /* ─── Transactions — Mobile cards ─── */
    .tx-cards { display: none; flex-direction: column; gap: 10px; }
    .tx-card {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
    }
    .tx-desc { font-size: .87rem; font-weight: 600; grid-column: 1; }
    .tx-amount {
      font-size: .95rem; font-weight: 700;
      font-family: 'DM Mono', monospace; color: var(--accent2);
      grid-column: 2; grid-row: 1 / 4; align-self: center; text-align: right;
    }
    .tx-meta { font-size: .73rem; color: var(--muted); grid-column: 1; }
    .tx-cat-wrap { grid-column: 1; margin-top: 2px; }

    @media (max-width: 520px) {
      .table-wrap { display: none; }
      .tx-cards { display: flex; }
    }

    /* ─── Actions ─── */
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .actions .btn { flex: 1; min-width: 120px; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: .85rem; padding: 10px 22px;
      border-radius: 50px; white-space: nowrap;
      transition: transform .3s; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">💸</div>
    <h1>Expense <span>Tracker</span></h1>
  </div>

  <!-- Upload Card -->
  <div class="card" id="uploadSection">
    <div class="card-title">Upload Statement</div>

    <div class="upload-area" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" onchange="onFileChosen(this)" />
      <div class="upload-icon">📄</div>
      <strong>Tap to choose a PDF</strong>
      <p>or drag &amp; drop here</p>
      <div class="file-chosen hidden" id="fileChosen"></div>
    </div>

    <input type="password" id="tokenInput" placeholder="GitHub Token" />
    <button class="btn btn-primary" onclick="upload()">⬆️ Upload &amp; Analyse</button>
  </div>

  <!-- Processing Card -->
  <div class="card hidden" id="processingSection">
    <div class="spinner"></div>
    <div class="proc-label" id="procLabel">Uploading to GitHub…</div>
  </div>

  <!-- Results -->
  <div id="resultsSection" class="hidden">

    <div class="card">
      <div class="card-title">Summary</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value rupee" id="totalSpent">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Transactions</div>
          <div class="stat-value" id="totalTrans">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Categories</div>
          <div class="stat-value" id="totalCats">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="view-control">
        <label for="groupBy">View by</label>
        <select id="groupBy" onchange="refreshChart()">
          <option value="category">Category</option>
          <option value="day_of_week">Day of Week</option>
        </select>
      </div>
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <div class="day-info hidden" id="dayInfo">
        <span class="day-label" id="dayBreakdown"></span>
        <button class="btn btn-ghost" id="viewAllBtn" onclick="viewAll()">View All</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Transactions</div>

      <!-- Desktop table -->
      <div class="table-wrap">
        <table class="tx-table" id="txTable">
          <thead>
            <tr>
              <th>#</th><th>Description</th><th>Amount</th>
              <th>Category</th><th>Date</th><th>Day</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>

      <!-- Mobile cards -->
      <div class="tx-cards" id="txCards"></div>

      <div class="actions">
        <button class="btn btn-sm" onclick="save()">💾 Save Changes</button>
        <button class="btn btn-sm" onclick="download()">⬇️ Download JSON</button>
      </div>
    </div>

  </div><!-- /resultsSection -->
</div><!-- /shell -->

<div class="toast" id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────
const GITHUB_REPO = 'infotechram/expense-tracker';
const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_REPO}/main`;

// ── State ──────────────────────────────────────────────────────────
let results = null;
let edits = {};
let uploadedFileName = null;
let chartInstance = null;

// ── Helpers ────────────────────────────────────────────────────────
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Drag & Drop ────────────────────────────────────────────────────
const dz = document.getElementById('dropZone');
['dragenter','dragover'].forEach(e =>
  dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('drag'); }));
['dragleave','drop'].forEach(e =>
  dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('drag'); }));
dz.addEventListener('drop', ev => {
  const f = ev.dataTransfer.files[0];
  if (f) { document.getElementById('fileInput').files = ev.dataTransfer.files; onFileChosen({ files: [f] }); }
});

function onFileChosen(input) {
  const f = input.files[0];
  const el = document.getElementById('fileChosen');
  if (f) { el.textContent = '✓ ' + f.name; el.classList.remove('hidden'); }
}

// ── Upload ─────────────────────────────────────────────────────────
async function upload() {
  const file = document.getElementById('fileInput').files[0];
  const token = document.getElementById('tokenInput').value;

  if (!file || !token) {
    showToast('Please select a file and enter your GitHub token');
    return;
  }

  const uniqueId = `${Date.now()}-${generateUUID()}`;
  uploadedFileName = uniqueId;
  const name = `uploads/${uniqueId}.pdf`;
  const reader = new FileReader();

  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    hide('uploadSection');
    show('processingSection');
    setLabel('Uploading to GitHub…');

    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/${name}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: `Upload PDF: ${file.name}`, content: base64 })
      }
    );

    if (res.ok) {
      setLabel('Analysing your statement…');
      pollResults();
    } else {
      hide('processingSection');
      show('uploadSection');
      showToast('Upload failed — check your token and repo name');
    }
  };

  reader.readAsDataURL(file);
}

function setLabel(msg) {
  document.getElementById('procLabel').textContent = msg;
}

// ── Polling ────────────────────────────────────────────────────────
async function pollResults() {
  const expectedFileName = `${uploadedFileName}_expenses.json`;

  for (let i = 0; i < 120; i++) {
    const res = await fetch(`${RAW_URL}/results/${expectedFileName}?t=${Date.now()}`);
    if (res.ok) {
      results = await res.json();
      showResults();
      return;
    }
    setLabel(`Analysing… (${i + 1}/120)`);
    await new Promise(r => setTimeout(r, 3000));
  }

  hide('processingSection');
  show('uploadSection');
  showToast('Timeout: processing took too long', 4000);
}

// ── Results ────────────────────────────────────────────────────────
function showResults() {
  hide('processingSection');
  show('resultsSection');

  const s = results.summary;
  document.getElementById('totalSpent').textContent = s.total_spent.toFixed(2);
  document.getElementById('totalTrans').textContent = s.transaction_count;
  document.getElementById('totalCats').textContent = Object.keys(s.by_category).length;

  drawChart(s.by_category);
  fillTable(results.transactions);
}

// ── Chart ──────────────────────────────────────────────────────────
function refreshChart() {
  const groupBy = document.getElementById('groupBy').value;
  hide('dayInfo');
  fillTable(results.transactions);
  drawChart(groupBy === 'day_of_week' ? results.summary.by_day_of_week : results.summary.by_category);
}

function drawChart(data) {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');

  if (chartInstance) chartInstance.destroy();
  if (canvas._clickHandler) canvas.removeEventListener('click', canvas._clickHandler);

  chartInstance = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: Object.keys(data),
      datasets: [{
        data: Object.values(data),
        backgroundColor: [
          '#7c6af7','#f76a8a','#fbbf24','#34d399',
          '#60a5fa','#f472b6','#a78bfa','#fb923c','#2dd4bf','#e879f9'
        ],
        borderColor: '#1a1d27',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: window.innerWidth < 440 ? 'bottom' : 'right',
          labels: {
            color: '#7b7f99',
            font: { family: 'Sora', size: 11 },
            boxWidth: 12, padding: 10
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ₹${(ctx.parsed || 0).toFixed(2)}`
          }
        }
      }
    }
  });

  canvas._clickHandler = function(event) {
    const els = chartInstance.getElementsAtEventForMode(event, 'nearest', { intersect: true }, false);
    if (!els.length) return;
    const label = Object.keys(data)[els[0].index];
    const groupBy = document.getElementById('groupBy').value;
    if (groupBy === 'day_of_week') showDayTransactions(label);
    else showCategoryTransactions(label);
  };
  canvas.addEventListener('click', canvas._clickHandler);
}

// ── Filters ────────────────────────────────────────────────────────
function showDayTransactions(day) {
  const filtered = results.transactions.filter(t => t.day_of_week === day);
  document.getElementById('dayBreakdown').textContent =
    `Showing ${filtered.length} transactions for ${day}`;
  show('dayInfo');
  fillTable(filtered);
}

function showCategoryTransactions(category) {
  const filtered = results.transactions.filter(t => t.category === category);
  document.getElementById('dayBreakdown').textContent =
    `Showing ${filtered.length} transactions for ${category}`;
  show('dayInfo');
  fillTable(filtered);
}

function viewAll() {
  hide('dayInfo');
  fillTable(results.transactions);
}

// ── Table ──────────────────────────────────────────────────────────
function fillTable(transactions) {
  // Desktop table
  const tbody = document.getElementById('txBody');
  tbody.innerHTML = '';
  transactions.forEach((t, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem">${i + 1}</td>
      <td>${esc(t.description)}</td>
      <td class="amount-col">₹${esc(t.amount)}</td>
      <td><input class="cat-input" type="text" value="${esc(t.category)}" onchange="edits[${i}]=this.value" /></td>
      <td style="white-space:nowrap;font-size:.78rem">${esc(t.date) || '-'}</td>
      <td style="color:var(--muted);font-size:.78rem">${esc(t.day_of_week) || '-'}</td>`;
    tbody.appendChild(tr);
  });

  // Mobile cards
  const cards = document.getElementById('txCards');
  cards.innerHTML = '';
  transactions.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'tx-card';
    d.innerHTML = `
      <div class="tx-desc">${esc(t.description)}</div>
      <div class="tx-amount">₹${esc(t.amount)}</div>
      <div class="tx-meta">${esc(t.date) || '-'} · ${esc(t.day_of_week) || '-'}</div>
      <div class="tx-cat-wrap">
        <input class="cat-input" type="text" value="${esc(t.category)}" onchange="edits[${i}]=this.value" />
      </div>`;
    cards.appendChild(d);
  });
}

// ── Save & Download ────────────────────────────────────────────────
function save() {
  Object.keys(edits).forEach(i => {
    results.transactions[i].category = edits[i];
  });

  const summary = {};
  let total = 0;
  results.transactions.forEach(t => {
    const amt = parseFloat(String(t.amount).replace(',', ''));
    summary[t.category] = (summary[t.category] || 0) + amt;
    total += amt;
  });

  results.summary = {
    total_spent: total,
    by_category: summary,
    transaction_count: results.transactions.length
  };

  edits = {};
  showToast('Changes saved ✓');
  showResults(); // re-render with updated data
}

function download() {
  const data = JSON.stringify(results, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), {
    href: url,
    download: `${uploadedFileName}_expenses.json`
  });
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
